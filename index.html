<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花非花</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 32px;
            font-weight: bold;
            color: #111827;
        }

        .login-area {
            position: relative;
        }

        .login-btn {
            background-color: #2563eb;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

            .login-btn:hover {
                background-color: #1d4ed8;
            }

        .logout-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

            .logout-area span {
                font-size: 14px;
                color: #4b5563;
            }

        .logout-btn {
            background-color: #dc2626;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

            .logout-btn:hover {
                background-color: #b91c1c;
            }

        .login-form {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background-color: white;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 256px;
            z-index: 100;
        }

            .login-form input {
                width: 100%;
                border: 1px solid #d1d5db;
                padding: 6px 8px;
                border-radius: 4px;
                margin-bottom: 8px;
                font-size: 14px;
            }

        .login-form-buttons {
            display: flex;
            gap: 8px;
        }

            .login-form-buttons button {
                flex: 1;
                padding: 6px 8px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
                color: white;
            }

        .submit-btn {
            background-color: #2563eb;
        }

            .submit-btn:hover {
                background-color: #1d4ed8;
            }

        .cancel-btn {
            background-color: #6b7280;
        }

            .cancel-btn:hover {
                background-color: #4b5563;
            }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid #d1d5db;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #4b5563;
            border-bottom: 2px solid transparent;
        }

            .tab:hover {
                color: #111827;
            }

            .tab.active {
                color: #2563eb;
                border-bottom-color: #2563eb;
            }

        .search-bar {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
        }

        .search-input {
            flex: 1;
            padding: 8px 12px;
            padding-left: 40px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .add-btn {
            background-color: #2563eb;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

            .add-btn:hover {
                background-color: #1d4ed8;
            }

        .content {
            display: none;
        }

            .content.active {
                display: block;
            }

        table {
            width: 100%;
            background-color: white;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            border-collapse: collapse;
        }

        thead {
            background-color: #f3f4f6;
            border-bottom: 1px solid #d1d5db;
        }

        /* 1. 設定所有表格的「標題列」 (包含成員、花朵、競賽) */
        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 500;
            color: #111827;
            /* ✨ 關鍵：這一行會讓三個分頁的標題通通不換行 ✨ */
            white-space: nowrap;
        }

        /* 2. 設定所有表格的「內容列」 (高度 30px + 不換行) */
        #members-table td,
        #flowers-table td,
        #competitions-table td {
            height: 30px; /* 強制高度 30px */
            padding: 0 8px; /* 縮減內距 */
            line-height: 30px; /* 垂直置中 */
            /* ✨ 關鍵：讓內容太長時變成 "..." 而不是換行撐高 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            color: #111827;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        .sub-row {
            background-color: #f9fafb !important;
        }

            .sub-row td {
                padding: 8px 16px;
                font-size: 14px;
                color: #4b5563;
            }

        .actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }

        .edit-btn {
            color: #2563eb;
        }

            .edit-btn:hover {
                color: #1d4ed8;
            }

        .delete-btn {
            color: #dc2626;
        }

            .delete-btn:hover {
                color: #b91c1c;
            }

        .form-row {
            background-color: #f9fafb;
        }

        .form-container {
            padding: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-container input,
        .form-container select,
        .form-container textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 14px;
        }

            .form-container input:disabled,
            .form-container select:disabled,
            .form-container textarea:disabled {
                background-color: #f3f4f6;
                cursor: not-allowed;
            }

        .form-buttons {
            display: flex;
            gap: 8px;
        }

            .form-buttons button {
                flex: 1;
                padding: 8px 16px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                color: white;
                font-size: 14px;
            }

        .save-btn {
            background-color: #16a34a;
        }

            .save-btn:hover {
                background-color: #15803d;
            }

            .save-btn:disabled {
                background-color: #9ca3af;
                cursor: not-allowed;
            }

        .form-cancel-btn {
            background-color: #6b7280;
        }

            .form-cancel-btn:hover {
                background-color: #4b5563;
            }

        .flower-form-box {
            background-color: white;
            border: 1px solid #d1d5db;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .grade-red {
            color: #ef4444;
            font-weight: bold;
        }

        .grade-orange {
            color: #f97316;
            font-weight: bold;
        }

        .grade-purple {
            color: #a855f7;
            font-weight: bold;
        }

        .grade-blue {
            color: #3b82f6;
            font-weight: bold;
        }

        .grade-green {
            color: #22c55e;
            font-weight: bold;
        }

        .checkbox-list {
            max-height: 160px;
            overflow-y: auto;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px;
            cursor: pointer;
        }

            .checkbox-item:hover {
                background-color: #f3f4f6;
            }

        .hidden {
            display: none !important;
        }
        /* ✨ 統一設定所有表格 (成員、花朵、競賽) 的高度為 30px ✨ */
        #members-table td,
        #flowers-table td,
        #competitions-table td {
            height: 30px; /* 強制高度 30px */
            padding: 0 8px; /* 上下內距歸零 */
            line-height: 30px; /* 讓文字垂直置中 */
            /* 防止內容太長撐開高度 (字太多會變 ...) */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px; /* 設定最大寬度，避免表格被長文字撐壞 */
        }

        /* 微調所有表格的操作按鈕，讓它塞得進 30px 的格子 */
        #members-table .actions,
        #flowers-table .actions,
        #competitions-table .actions {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            align-items: center; /* 按鈕垂直置中 */
            justify-content: center;
        }

        /* 讓「等級」欄位 (花朵清單) 的標籤字體稍微縮小，才不會切到 */
        .grade-red, .grade-orange, .grade-purple, .grade-blue, .grade-green {
            font-size: 13px;
        }

        /* ✨ 通用詳細資料卡片 (Modal) ✨ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s; /* 淡入淡出效果 */
        }

            .modal.show {
                opacity: 1;
                visibility: visible;
            }

        .modal-content {
            background-color: white;
            width: 90%;
            max-width: 400px;
            max-height: 85vh;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow-y: auto;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.2s; /* 縮放動畫 */
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        /* 卡片內容排版 */
        .modal-header {
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            color: #111827;
        }

        .modal-subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-top: 4px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px dashed #f3f4f6;
            padding-bottom: 8px;
        }

        .detail-label {
            font-size: 13px;
            color: #6b7280;
        }

        .detail-value {
            font-size: 15px;
            color: #111827;
            font-weight: 500;
            text-align: right;
            max-width: 70%;
        }

        .section-title {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 20px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 彩色花朵標籤 */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .flower-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 500;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            color: #374151;
        }

        /* 關閉按鈕 */
        .modal-close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #f3f4f6;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 20px;
            color: #6b7280;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

            .modal-close-btn:hover {
                background: #e5e7eb;
                color: #111827;
            }

        /* 讓表格裡的字變藍色可點擊 */
        .clickable-link {
            color: #2563eb;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            position: relative;
        }

            .clickable-link:hover {
                text-decoration: underline;
                color: #1d4ed8;
            }

        /* ✨ 救援表單：讓新增/編輯表單的欄位自動長高，不要被鎖死在 30px ✨ */
        tr.form-row td {
            height: auto !important; /* 解除高度限制 */
            white-space: normal !important; /* 允許內容換行 */
            overflow: visible !important; /* 允許內容超出 */
            max-width: none !important; /* 解除寬度限制 */
            padding: 16px !important; /* 給表單舒服的內距 */
        }

        /* ✨ 救援 Checkbox：防止它被撐大，讓文字顯示出來 ✨ */
        .form-container input[type="checkbox"] {
            width: auto !important; /* 寬度回復正常 (不要100%) */
            height: auto !important; /* 高度回復正常 */
            margin-right: 8px !important; /* 與文字保持距離 */
            padding: 0 !important; /* 移除多餘內距 */
            border: none !important; /* 移除邊框 */
            display: inline-block; /* 確保並排顯示 */
            flex-shrink: 0; /* 防止被壓縮 */
        }

        /* 確保手機版標籤文字不會被切掉 */
        .checkbox-item {
            align-items: center !important;
            overflow: visible !important; /* 允許文字凸出來 (如果太長) */
        }

        /* ✨ 公會管理區樣式 ✨ */
        .guild-manager-box {
            background-color: #f0f9ff; /* 淺藍色背景 */
            border: 1px solid #bae6fd;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .guild-manager-title {
            font-size: 16px;
            font-weight: bold;
            color: #0369a1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .guild-input-group {
            display: flex;
            gap: 8px;
            max-width: 400px;
        }

        /* 公會標籤 (可刪除) */
        .guild-tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background-color: white;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 14px;
            color: #334155;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .guild-delete-btn {
            margin-left: 8px;
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

            .guild-delete-btn:hover {
                background-color: #fee2e2;
            }

    </style>
</head>
<body>
    <div class="container">
        <!-- 標題和登入區 -->
        <div class="header">
            <h1>花非花</h1>
            <div class="login-area">
                <div id="loginButton">
                    <button class="login-btn" onclick="showLoginForm()">管理員登入</button>
                </div>
                <div id="loginFormBox" class="login-form hidden">
                    <form onsubmit="handleLogin(event)">
                        <input type="text" id="username" placeholder="帳號" required>
                        <input type="password" id="password" placeholder="密碼" required>
                        <div class="login-form-buttons">
                            <button type="submit" class="submit-btn">登入</button>
                            <button type="button" class="cancel-btn" onclick="hideLoginForm()">取消</button>
                        </div>
                    </form>
                </div>
                <div id="logoutArea" class="logout-area hidden">
                    <span>已登入管理員</span>
                    <button class="logout-btn" onclick="handleLogout()">登出</button>
                </div>
            </div>
        </div>
    </div>

        <!-- 分頁 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('members')">成員清單</button>
            <button class="tab" onclick="switchTab('flowers')">花朵清單</button>
            <button class="tab" onclick="switchTab('competitions')">本週競賽</button>
        </div>

        <div id="members-content" class="content active">

                <div id="guild-manager-area" class="guild-manager-box hidden">
                    <div class="guild-manager-title">🏢 公會管理 (僅管理員可見)</div>
                    <div class="guild-input-group">
                        <input type="text" id="new-guild-name" placeholder="輸入新公會名稱" style="flex:1;">
                        <button class="add-btn" onclick="addGuild()">新增</button>
                    </div>
                    <div style="font-size: 13px; color: #64748b; margin-top: 4px;">目前已建立的公會 (點擊 X 可刪除)：</div>
                    <div id="guild-list-display" class="tags-container" style="margin-top: 8px;">
                    </div>
                </div>
                <div class="search-bar">
                    <div class="search-bar">
                        <div class="search-wrapper">
                            <span class="search-icon">🔍</span>
                            <input type="text" class="search-input" id="members-search" placeholder="搜尋成員名稱..." onkeyup="searchTable('members')">
                        </div>
                    </div>
                </div>
                    <div style="margin-bottom: 16px;">
                        <button class="add-btn" onclick="showMemberForm()">
                            ➕ 新增成員
                        </button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>遊戲名稱</th>
                                <th>遊戲ID</th>
                                <th>公會</th>
                                <th class="center">擁有花</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="members-table"></tbody>
                    </table>
                </div> <div id="flowers-content" class="content">
                    <div class="search-bar">
                        <div class="search-wrapper">
                            <span class="search-icon">🔍</span>
                            <input type="text" class="search-input" id="flowers-search" placeholder="搜尋花朵名稱..." onkeyup="searchTable('flowers')">
                        </div>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <button class="add-btn" onclick="toggleFlowerForm()">
                            ➕ <span id="flower-btn-text">新增花朵資料</span>
                        </button>
                    </div>
                    <div id="flower-form-box" class="flower-form-box hidden"></div>
                    <table>
                        <thead>
                            <tr>
                                <th>花朵名稱</th>
                                <th>誰擁有</th>
                                <th onclick="sortFlowersByGrade()" style="cursor: pointer; user-select: none;">
                                    等級 <span id="grade-sort-icon">↕</span>
                                </th>
                                <th onclick="sortFlowersByScore()" style="cursor: pointer; user-select: none;">
                                    競賽分數 <span id="score-sort-icon">↕</span>
                                </th>
                                <th>上市日期</th>
                                <th>花瓶</th>
                                <th>備註</th>
                                <th>來源</th>
                                <th class="center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="flowers-table"></tbody>
                    </table>
                </div>


                <div id="competitions-content" class="content">

                    <div class="search-bar">
                        <div class="search-wrapper">
                            <span class="search-icon">🔍</span>
                            <input type="text" class="search-input" id="competitions-flower-search"
                                   placeholder="搜尋參賽花朵 (任意文字)..." onkeyup="renderCompetitions()">
                        </div>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <button class="add-btn" onclick="showCompetitionForm()">
                            ➕ 新增競賽記錄
                        </button>
                    </div>

                    <div class="search-bar">
                        <select id="comp-guild-filter" onchange="renderCompetitions()" style="
                    padding: 8px;
                    border: 1px solid #d1d5db;
                    border-radius: 8px;
                    margin-right: 12px;
                    cursor: pointer;
                ">
                            <option value="">全部公會</option>
                        </select>

                        <div class="search-wrapper">
                            <span class="search-icon">🔍</span>
                            <input type="text" class="search-input" id="competitions-member-search"
                                   placeholder="搜尋成員名稱 (任意文字)..." onkeyup="renderCompetitions()">
                        </div>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>成員名稱</th>
                                <th>選擇的花朵</th>
                                <th class="center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="competitions-table"></tbody>
                    </table>
                </div>

                <div id="universal-modal" class="modal" onclick="closeModal(event)">
                    <div class="modal-content" onclick="event.stopPropagation()">
                        <button class="modal-close-btn" onclick="closeModal()">×</button>
                        <div id="modal-body-content">
                        </div>
                    </div>
                </div>

                <script>
                    // 全域變數
                    const API_URL = 'https://script.google.com/macros/s/AKfycbxuWHTrw_r1PHzNHTgnt5LTavhDLLhcP57OqNAOyUGmBT5vCjOpzYGzrA4M2iGGGf0V/exec';

                    const ADMIN_USERNAME = 'hua500008';
                    const ADMIN_PASSWORD = 'fei500008';
                    let isAuthenticated = false;
                    let currentTab = 'members';
                    let members = [];
                    let flowers = [];
                    let competitions = [];

                    async function loadData() {
                        try {
                            document.body.style.cursor = 'wait';

                            // 1. 取得資料
                            const response = await fetch(API_URL + '?action=getData');
                            const text = await response.text();

                            // 2. 清除隱形空白並轉成資料
                            let data;
                            try {
                                data = JSON.parse(text.trim());
                            } catch (e) {
                                console.error('JSON 解析失敗', e);
                                throw new Error('資料格式錯誤，請檢查 Google Sheet');
                            }

                            // 3. 更新變數
                            members = data.members || [];
                            flowers = data.flowers || [];
                            competitions = data.competitions || [];
                            guilds = data.guilds || []; // ✨ 加入這行：讀取雲端公會資料

                            // 資料修復機制 (保持原本的邏輯)
                            members.forEach(m => {
                                if (!Array.isArray(m.ownedFlowers)) {
                                    if (typeof m.ownedFlowers === 'string') {
                                        if (m.ownedFlowers.trim().startsWith('[')) {
                                            try { m.ownedFlowers = JSON.parse(m.ownedFlowers); } catch (e) { m.ownedFlowers = []; }
                                        } else if (m.ownedFlowers.trim() !== '') {
                                            m.ownedFlowers = m.ownedFlowers.split(',').map(s => s.trim());
                                        } else { m.ownedFlowers = []; }
                                    } else { m.ownedFlowers = []; }
                                }
                            });

                            competitions.forEach(c => {
                                if (!Array.isArray(c.selectedFlowers)) {
                                    if (typeof c.selectedFlowers === 'string' && c.selectedFlowers.trim().startsWith('[')) {
                                        try { c.selectedFlowers = JSON.parse(c.selectedFlowers); } catch (e) { c.selectedFlowers = []; }
                                    } else { c.selectedFlowers = []; }
                                }
                            });

                            // 4. 渲染畫面
                            renderMembers();
                            renderFlowers();
                            renderCompetitions();
                            renderGuildManager(); // ✨ 加入這行：渲染公會管理區
                            // ✨ 請確保這裡有這一行：
                            initCompGuildFilter();

                            document.body.style.cursor = 'default';
                            console.log('雲端資料載入並修復成功！');

                        } catch (error) {
                            console.error('載入失敗:', error);
                            alert('讀取失敗，錯誤訊息：' + error.message);
                            document.body.style.cursor = 'default';
                        }
                    }

                        if (guilds.length === 0) {

                            filterSelect.innerHTML = '<option value="">全部公會</option>'; // 保持結構但不顯示
                            return;

                        // 如果有公會，就顯示並填入選項

                    // 儲存資料
                    function saveDataToCloud(type, dataContent) {
                        const saveBtn = document.querySelector('.save-btn');
                        if (saveBtn) { saveBtn.textContent = '☁️ 儲存中...'; saveBtn.disabled = true; }

                        fetch(API_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                type: type,
                                content: dataContent
                            })
                        })
                            .then(res => res.json())
                            .then(result => {
                                console.log(type + ' 儲存成功');
                                if (saveBtn) { saveBtn.textContent = '💾 儲存'; saveBtn.disabled = false; }
                            })
                            .catch(err => {
                                console.error('儲存失敗', err);
                                alert('儲存失敗，請備份資料！');
                                if (saveBtn) { saveBtn.textContent = '💾 儲存'; saveBtn.disabled = false; }
                            });
                    }

                        const searchValue = document.getElementById(type + '-search').value.toLowerCase().trim();
                        const table = document.getElementById(type + '-table');

                            if (type === 'members') {

                                targetText = row.cells[0] ? row.cells[0].textContent : '';
                            } else if (type === 'flowers') {

                                targetText = row.cells[0] ? row.cells[0].textContent : '';
                            } else {

                                targetText = row.textContent;

                            if (targetText.toLowerCase().includes(searchValue)) {

                            } else {

                    function editMember(id) {
                        // 所有人都可以點擊編輯，但權限會在 showMemberForm 裡面控制 (鎖欄位)

function saveMember(event, id) {
    event.preventDefault();

    const gameNameInput = document.getElementById('member-gameName');
    const gameIdInput = document.getElementById('member-gameId');
    const guildInput = document.getElementById('member-guild'); // 可能是選單也可能是隱藏欄位

    // 取得新輸入的名字
    const newName = gameNameInput.value.trim();
    
    // 取得選中的花朵
    const checkboxes = document.querySelectorAll('input[name="member-flower-select"]:checked');
    const ownedFlowers = Array.from(checkboxes).map(cb => cb.value);

    if (id) {
        // --- 編輯模式 ---
        const index = members.findIndex(m => m.id === id);
        if (index === -1) return;

        // ✨ 關鍵步驟 1: 記錄原本的舊名字
        const oldName = members[index].gameName;

        if (isAuthenticated) {
            // 管理員：更新全部
            members[index] = {
                ...members[index],
                gameName: newName,
                gameId: gameIdInput.value,
                guild: guildInput.value,
                ownedFlowers
            };
        } else {
            // 一般人：只更新公會和花朵，名字ID維持原樣 (防止被亂改)
            // 但如果這邊沒改名，oldName === newName，下面的連動邏輯就不會執行，所以沒關係
            members[index] = {
                ...members[index],
                guild: guildInput.value,
                ownedFlowers
            };
        }

        // ✨ 關鍵步驟 2: 檢查名字是否改變，若改變則連動更新 [競賽紀錄]
        if (isAuthenticated && oldName !== newName) {
            let competitionUpdated = false;
            
            competitions.forEach(c => {
                // 比對舊名字 (加上 String 轉型避免數字名字出錯)
                if (String(c.memberName) === String(oldName)) {
                    c.memberName = newName; // 換成新名字
                    competitionUpdated = true;
                }
            });

            // 如果有更新到競賽紀錄，就存檔並重繪
            if (competitionUpdated) {
                saveDataToCloud('competitions', competitions);
                renderCompetitions();
                console.log(`已自動將競賽紀錄中的「${oldName}」更新為「${newName}」`);
            }
        }

    } else {
        // --- 新增模式 ---
        members.push({
            id: Date.now(),
            gameName: newName,
            gameId: gameIdInput.value,
            guild: guildInput.value,
            ownedFlowers
        });
    }

    // 儲存成員資料
    saveDataToCloud('members', members);
    
    // 更新畫面
    renderMembers();
    renderFlowers(); // 連動更新花朵列表的擁有者
}

                        if (confirm('確定要刪除此成員嗎?')) {

                    function saveFlower(event, id) {
                        event.preventDefault();

                        // 權限檢查：編輯舊資料必須是管理員
                        if (id && !isAuthenticated) {
                            alert('權限不足：只有管理員可以修改花朵資料。');
                            return;
                        }

                        const name = document.getElementById('flower-name').value;
                        const source = document.getElementById('flower-source').value;
                        const grade = document.getElementById('flower-grade').value;
                        const competitionScore = parseInt(document.getElementById('flower-score').value);
                        const releaseDate = document.getElementById('flower-date').value;
                        const vase = document.getElementById('flower-vase').value;
                        const note = document.getElementById('flower-note').value;

                        if (id) {
                            const index = flowers.findIndex(f => f.id === id);
                            const oldName = flowers[index].name;

                            flowers[index] = { ...flowers[index], name, source, grade, competitionScore, releaseDate, vase, note };

                            // 改名連動
                            if (oldName !== name) {
                                let memberUpdated = false;
                                let competitionUpdated = false;
                                members.forEach(m => {
                                    if (m.ownedFlowers && m.ownedFlowers.includes(oldName)) {
                                        m.ownedFlowers = m.ownedFlowers.map(f => f === oldName ? name : f);
                                        memberUpdated = true;
                                    }
                                });
                                competitions.forEach(c => {
                                    if (c.selectedFlowers && c.selectedFlowers.includes(oldName)) {
                                        c.selectedFlowers = c.selectedFlowers.map(f => f === oldName ? name : f);
                                        competitionUpdated = true;
                                    }
                                });
                                if (memberUpdated) saveDataToCloud('members', members);
                                if (competitionUpdated) saveDataToCloud('competitions', competitions);
                            }
                        } else {
                            // 新增 (所有人都可以)
                            flowers.push({ id: Date.now(), name, source, grade, competitionScore, releaseDate, vase, note });
                        }

                        saveDataToCloud('flowers', flowers);
                        closeFlowerForm();
                        renderFlowers();
                        renderMembers(); // 更新成員列表的擁有狀態
                        renderCompetitions();
                    }

                    function editFlower(id) {
                        if (!isAuthenticated) {
                            alert('請先登入管理員帳號才能進行編輯');
                            return;
                        }
                        const flower = flowers.find(f => f.id === id);
                        showFlowerFormInBox(flower);
                        document.getElementById('flower-btn-text').textContent = '取消編輯';
                    }

                    function deleteFlower(id) {
                        if (!isAuthenticated) {
                            alert('請先登入管理員帳號才能進行編輯');
                            return;
                        }
                        const flowerToDelete = flowers.find(f => f.id === id);
                        if (!flowerToDelete) return;

                        if (confirm(`確定要刪除「${flowerToDelete.name}」嗎？\n注意：這將會從所有成員的擁有清單和競賽紀錄中移除此花朵！`)) {
                            const targetName = flowerToDelete.name;
                            flowers = flowers.filter(f => f.id !== id);

                            // 連動刪除
                            let memberUpdated = false;
                            let competitionUpdated = false;
                            members.forEach(m => {
                                if (m.ownedFlowers && m.ownedFlowers.includes(targetName)) {
                                    m.ownedFlowers = m.ownedFlowers.filter(f => f !== targetName);
                                    memberUpdated = true;
                                }
                            });
                            competitions.forEach(c => {
                                if (c.selectedFlowers && c.selectedFlowers.includes(targetName)) {
                                    c.selectedFlowers = c.selectedFlowers.filter(f => f !== targetName);
                                    competitionUpdated = true;
                                }
                            });

                            saveDataToCloud('flowers', flowers);
                            if (memberUpdated) saveDataToCloud('members', members);
                            if (competitionUpdated) saveDataToCloud('competitions', competitions);
                            renderFlowers();
                            renderMembers();
                            renderCompetitions();
                        }
                    }

                    // ✨ 花朵等級排序功能
                    let isGradeDesc = false; // 排序狀態

                    function sortFlowersByGrade() {
                        // 1. 切換排序順序
                        isGradeDesc = !isGradeDesc;

                        // 2. 更新箭頭圖示
                        const icon = document.getElementById('grade-sort-icon');
                        if (icon) icon.textContent = isGradeDesc ? '↓' : '↑'; // ↓代表高等級(紅)在上面

                        // 3. 定義等級的分數 (權重)，讓紅最重，綠最輕
                        const gradeWeight = {
                            '紅': 5,
                            '橙': 4,
                            '紫': 3,
                            '藍': 2,
                            '綠': 1
                        };

                        // 4. 執行排序
                        flowers.sort((a, b) => {
                            // 取出等級的第一個字 (例如 "紅(仙品)" 取 "紅")
                            const charA = a.grade ? a.grade.charAt(0) : '';
                            const charB = b.grade ? b.grade.charAt(0) : '';

                            // 轉換成數字權重，如果找不到就當作 0
                            const weightA = gradeWeight[charA] || 0;
                            const weightB = gradeWeight[charB] || 0;

                            // 依照權重排序
                            return isGradeDesc ? (weightB - weightA) : (weightA - weightB);
                        });

                        // 5. 重新渲染畫面
                        renderFlowers();
                    }

                    // ✨ 花朵分數排序功能
                    let isScoreDesc = false; // 記錄目前的排序狀態 (false=原本亂的, true=由高到低)

                    function sortFlowersByScore() {
                        // 1. 切換排序順序 (高->低 或 低->高)
                        isScoreDesc = !isScoreDesc;

                        // 2. 更新箭頭圖示
                        const icon = document.getElementById('score-sort-icon');
                        if (icon) icon.textContent = isScoreDesc ? '↓' : '↑'; // ↓代表由高到低

                        // 3. 執行排序
                        flowers.sort((a, b) => {
                            const scoreA = parseInt(a.competitionScore) || 0;
                            const scoreB = parseInt(b.competitionScore) || 0;

                            // 如果是 Desc (由高到低)，就是 B - A
                            // 如果是 Asc (由低到高)，就是 A - B
                            return isScoreDesc ? (scoreB - scoreA) : (scoreA - scoreB);
                        });

                        // 4. 重新渲染畫面
                        renderFlowers();
                    }

                    // ==========================================

                    // ==========================================

                    function openModal(htmlContent) {
                        const modal = document.getElementById('universal-modal');
                        document.getElementById('modal-body-content').innerHTML = htmlContent;
                        modal.classList.add('show');
                    }

                    function closeModal(event) {
                        // 點擊背景或關閉按鈕時觸發
                        if (event && event.target.id !== 'universal-modal' && !event.target.classList.contains('modal-close-btn')) return;
                        document.getElementById('universal-modal').classList.remove('show');
                    }

                    function generateFlowerTags(flowerList) {
                        if (!flowerList || flowerList.length === 0) return '<span style="color:#999; font-size:13px;">無</span>';
                        return flowerList.map(fName => {
                            const fInfo = flowers.find(f => f.name === fName);
                            const color = fInfo ? getGradeColorCode(fInfo.grade) : '#374151';
                            return `<span class="flower-tag" style="color:${color}; border-color:${color}30; background:${color}08;">${fName}</span>`;
                        }).join('');
                    }

                    function getGradeColorCode(grade) {
                        if (!grade) return '#374151';
                        if (grade.includes('紅')) return '#ef4444';
                        if (grade.includes('橙')) return '#f97316';
                        if (grade.includes('紫')) return '#a855f7';
                        if (grade.includes('藍')) return '#3b82f6';
                        if (grade.includes('綠')) return '#22c55e';
                        return '#374151';
                    }

                    function getGradeColorClass(grade) {
                        if (!grade) return 'gray';
                        return grade.split(':')[0].toLowerCase()
                            .replace('紅', 'red').replace('橙', 'orange').replace('紫', 'purple')
                            .replace('藍', 'blue').replace('綠', 'green');
                    }

                        // 所有人都可以編輯
                        const competition = competitions.find(c => c.id === id);
                        showCompetitionForm(competition);

                            competitions = competitions.filter(c => c.id !== id);
                            saveDataToCloud('competitions', competitions);
                            renderCompetitions();

                    function filterCheckboxes(input, containerId) {
                        // ✨ 關鍵修改：加上 .trim() 去除手機自動產生的空白
                        const filter = input.value.toLowerCase().trim();

                        const container = document.getElementById(containerId);
                        const labels = container.getElementsByTagName('label'); // 抓出所有選項

                        for (let i = 0; i < labels.length; i++) {
                            const span = labels[i].getElementsByTagName('span')[0]; // 抓出文字部分
                            if (span) {
                                const txtValue = span.textContent || span.innerText;
                                // 如果文字包含搜尋關鍵字，就顯示；否則隱藏
                                if (txtValue.toLowerCase().indexOf(filter) > -1) {
                                    labels[i].style.display = "";
                                    labels[i].classList.remove('hidden');
                                } else {
                                    labels[i].style.display = "none";
                                }
                            }
                        }
                    }

                            if (labels[i].style.display !== 'none' && !labels[i].classList.contains('hidden')) {

        </div>
        
        <div style="margin-bottom: 10px;">
            <input type="text" placeholder="🔍 搜尋成員..." oninput="filterDistributeList(this)" 
                   style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
        </div>

        <div style="margin-bottom: 10px; display: flex; gap: 8px;">
            <button type="button" onclick="toggleAllDistribute(true)" style="padding: 4px 12px; background: #e5e7eb; border: none; border-radius: 4px; cursor: pointer;">✅ 全選</button>
            <button type="button" onclick="toggleAllDistribute(false)" style="padding: 4px 12px; background: #e5e7eb; border: none; border-radius: 4px; cursor: pointer;">⬜ 全不選</button>
        </div>

        <div id="distribute-list" style="max-height: 300px; overflow-y: auto; border: 1px solid #eee; border-radius: 4px;">
            ${membersHtml}
        </div>

        <div class="form-buttons" style="margin-top: 16px;">
            <button onclick="saveFlowerDistribution()" class="save-btn" style="width:100%; justify-content:center;">💾 儲存變更</button>
        </div>
    `;
    
    openModal(html);
}

// 儲存派發結果
function saveFlowerDistribution() {
    if (!currentDistributeFlowerId) return;
    
    const flower = flowers.find(f => f.id === currentDistributeFlowerId);
    if (!flower) return;
    
    const checkboxes = document.querySelectorAll('input[name="distribute-member"]');
    const checkedMemberIds = Array.from(checkboxes).filter(cb => cb.checked).map(cb => parseInt(cb.value));
    
    let isUpdated = false;

    // 遍歷所有成員，更新他們的擁有狀態
    members.forEach(m => {
        const shouldHave = checkedMemberIds.includes(m.id);
        const actuallyHas = m.ownedFlowers && m.ownedFlowers.includes(flower.name);
        
        if (shouldHave && !actuallyHas) {
            // 應該有但沒有 -> 加入
            if (!m.ownedFlowers) m.ownedFlowers = [];
            m.ownedFlowers.push(flower.name);
            isUpdated = true;
        } else if (!shouldHave && actuallyHas) {
            // 不該有但有 -> 移除
            m.ownedFlowers = m.ownedFlowers.filter(f => f !== flower.name);
            isUpdated = true;
        }
    });

    if (isUpdated) {
        saveDataToCloud('members', members);
        renderFlowers(); // 更新列表顯示的擁有者
        renderMembers(); // 更新成員列表
        closeModal();
        alert(`已成功更新「${flower.name}」的擁有者名單！`);
    } else {
        closeModal();
    }
}

// 搜尋篩選成員
function filterDistributeList(input) {
    const filter = input.value.toLowerCase().trim();
    const list = document.getElementById('distribute-list');
    const labels = list.getElementsByTagName('label');
    
    for (let label of labels) {
        const text = label.textContent.toLowerCase();
        label.style.display = text.includes(filter) ? '' : 'none';
    }
}

// 全選/全不選 (僅針對篩選後的顯示項目)
function toggleAllDistribute(checked) {
    const list = document.getElementById('distribute-list');
    const labels = list.getElementsByTagName('label');
    
    for (let label of labels) {
        if (label.style.display !== 'none') {
            const cb = label.querySelector('input[type="checkbox"]');
            if (cb) cb.checked = checked;
        }
    }
}

                    window.onload = init;
                </script>
